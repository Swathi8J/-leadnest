<div class="shell">
  <header class="topbar" *ngIf="(user$ | async) as user">
    <a class="brand" routerLink="/">LeadNest</a>
    <nav class="nav">
      <a routerLink="/">Dashboard</a>
      <a routerLink="/leads/new">New lead</a>
    </nav>
    <div class="account">
      <span class="email">{{ user.email }}</span>
      <button class="btn-ghost" (click)="logout()">Sign out</button>
    </div>
  </header>
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
